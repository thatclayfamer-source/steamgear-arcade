<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SteamGear Arcade</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header>
    <div class="logo">⚙ SteamGear Arcade</div>

    <input id="search" placeholder="Search games...">

    <!-- TABS -->
    <div class="top-buttons">

        <button onclick="showAll()">All Games</button>
        <button onclick="showFav()">Favorites ⭐</button>

        <button onclick="openSubmit()">Submit Game</button>
        <button onclick="openAdmin()">Admin</button>

    </div>
</header>

<!-- GAME GRID -->
<main id="gameGrid"></main>

<!-- GAME OVERLAY -->
<div id="overlay" class="hidden">

    <!-- small X -->
    <div id="closeX" onclick="closeGame()">✕</div>

    <!-- control bar -->
    <div class="game-bar">
        <button onclick="closeGame()">Exit (ESC)</button>
        <button onclick="clearSave()">Clear Save</button>
        <button onclick="toggleFullscreen()">Fullscreen</button>
    </div>

    <!-- GAME DISPLAY -->
    <iframe id="gameFrame"></iframe>

</div>

<!-- SUBMIT POPUP (placeholder system) -->
<div id="submitBox" class="popup hidden">
    <h2>Submit a Game</h2>
    <input id="submitInput" placeholder="Game name or link">
    <button onclick="submitGame()">Submit</button>
</div>

<!-- ADMIN POPUP (optional fallback if you want later UI upgrade) -->
<div id="adminBox" class="popup hidden">
    <h2>Admin Panel</h2>
    <div id="adminPanel"></div>
</div>

<script src="script.js"></script>

</body>
</html>
